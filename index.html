<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUTORIAL DOXING • ACCESS</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="canvas-container"></div>
    <div class="main-content">
        <div class="badge" data-aos="fade-down">ACCESS SYSTEM • KEY REQUIRED</div>
        <header data-aos="zoom-in">
            <h1 class="filled">TUTORIAL</h1>
            <h1 class="outline">DOXING</h1>
        </header>
        <p class="description" data-aos="fade-up"><span>ENTER ACCESS KEY</span></p>

        <div class="key-form" data-aos="fade-up">
            <input type="text" id="keyInput" class="minimal-input" placeholder="ENTER YOUR KEY HERE" autocomplete="off">
            <button id="accessBtn" class="btn-filled">UNLOCK ACCESS</button>
            <div id="authMessage" class="auth-message info" style="display: none;"></div>
        </div>

        <div class="guest-contacts" data-aos="fade-up" data-aos-delay="800">
            <a href="https://t.me/swatwastend" target="_blank">TELEGRAM: @swatwastend</a>
            <span>DISCORD: afafafafafafafa3</span>
        </div>

        <div class="footer-note" data-aos="fade"><span>OSINT TUTORIAL • KEY SYSTEM</span></div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="server.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        // === BACKGROUND (white on black) ===
        (function initWhiteBackground() {
            const container = document.getElementById('canvas-container');
            if (!container) return;
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 20;
            camera.position.y = 2;
            camera.rotation.x = 0.1;
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0x404060);
            scene.add(ambient);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(1, 2, 5);
            scene.add(dirLight);

            const whiteColor = 0xffffff;
            const triangles = [];

            for (let i = 0; i < 50; i++) {
                const size = 0.4 + Math.random() * 0.7;
                const h = size * Math.sqrt(3) / 2;
                const vertices = new Float32Array([0, h/2, 0, -size/2, -h/2, 0, size/2, -h/2, 0]);
                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
                geometry.setIndex([0, 1, 1, 2, 2, 0]);

                const lineMaterial = new THREE.LineBasicMaterial({ color: whiteColor });
                const line = new THREE.LineSegments(geometry, lineMaterial);

                const fillGeo = new THREE.BufferGeometry();
                fillGeo.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
                fillGeo.setIndex([0, 1, 2]);
                const fillMat = new THREE.MeshBasicMaterial({ color: whiteColor, transparent: true, opacity: 0.08, side: THREE.DoubleSide });
                const fillMesh = new THREE.Mesh(fillGeo, fillMat);

                const group = new THREE.Group();
                group.add(line);
                group.add(fillMesh);

                group.position.x = (Math.random() - 0.5) * 40;
                group.position.y = (Math.random() - 0.5) * 30;
                group.position.z = (Math.random() - 0.5) * 30 - 5;
                group.rotation.x = Math.random() * Math.PI;
                group.rotation.y = Math.random() * Math.PI;
                group.rotation.z = Math.random() * Math.PI;

                group.userData = {
                    rotSpeedX: (Math.random() - 0.5) * 0.001,
                    rotSpeedY: (Math.random() - 0.5) * 0.001,
                    rotSpeedZ: (Math.random() - 0.5) * 0.001,
                    floatSpeed: 0.0004 + Math.random() * 0.0008,
                    floatPhase: Math.random() * 2 * Math.PI,
                    initialPos: group.position.clone()
                };
                scene.add(group);
                triangles.push(group);
            }

            const circleGeometry = new THREE.CircleGeometry(1.5, 32);
            const circleMat1 = new THREE.MeshBasicMaterial({ color: whiteColor, transparent: true, opacity: 0.12, side: THREE.DoubleSide });
            const circle1 = new THREE.Mesh(circleGeometry, circleMat1);
            circle1.position.set(-12, 8, -15);
            scene.add(circle1);

            const circleMat2 = new THREE.MeshBasicMaterial({ color: whiteColor, transparent: true, opacity: 0.1, side: THREE.DoubleSide });
            const circle2 = new THREE.Mesh(circleGeometry, circleMat2);
            circle2.position.set(15, -10, -20);
            circle2.scale.set(1.2, 1.2, 1.2);
            scene.add(circle2);

            const squareGeometry = new THREE.BoxGeometry(8, 8, 0.5);
            const squareMat = new THREE.MeshBasicMaterial({ color: whiteColor, transparent: true, opacity: 0.1, wireframe: true });
            const flyingSquare = new THREE.Mesh(squareGeometry, squareMat);
            flyingSquare.position.set(0, 0, -25);
            flyingSquare.userData = { time: Math.random() * 100, rangeX: 20, rangeY: 15, baseX: 0, baseY: 0 };
            scene.add(flyingSquare);

            function animate() {
                requestAnimationFrame(animate);
                const time = performance.now() * 0.001;
                triangles.forEach(t => {
                    t.rotation.x += t.userData.rotSpeedX;
                    t.rotation.y += t.userData.rotSpeedY;
                    t.rotation.z += t.userData.rotSpeedZ;
                    t.position.y = t.userData.initialPos.y + Math.sin(time * 0.6 + t.userData.floatPhase) * 0.4;
                    t.position.x = t.userData.initialPos.x + Math.cos(time * 0.5 + t.userData.floatPhase) * 0.4;
                    t.position.z = t.userData.initialPos.z + Math.sin(time * 0.55 + t.userData.floatPhase) * 0.4;
                });
                flyingSquare.userData.time += 0.003;
                flyingSquare.position.x = flyingSquare.userData.baseX + Math.sin(flyingSquare.userData.time * 0.15) * flyingSquare.userData.rangeX;
                flyingSquare.position.y = flyingSquare.userData.baseY + Math.cos(flyingSquare.userData.time * 0.1) * flyingSquare.userData.rangeY;
                flyingSquare.rotation.z += 0.0005;

                camera.position.x = Math.sin(time * 0.04) * 2;
                camera.position.y = 2 + Math.sin(time * 0.05) * 0.5;
                camera.lookAt(0, 0, 0);
                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        })();

        // === KEY SYSTEM ===
        const VALID_KEYS = window.VALID_KEYS || [
            "345435-REWAF-2342434-FSDFSEF", "782349-KJIOU-9876543-PLOKMN", "563421-QWERT-1234567-ASDFGH",
            "129876-ZXCVB-3456789-MNBVCX", "908712-YUIOP-5678901-LKJHGF", "456123-ERTYU-7890123-POIUYT",
            "789456-DFGHJ-2345678-WERCVB", "321654-XCVBN-8901234-MNBVCX", "654987-RTYUI-4567890-LKJHGF",
            "147258-WERFD-6789012-QWERTY", "258369-CVBNM-1238904-ASDFRE", "369147-BNMXC-5672348-ZXCVBN",
            "741852-PLKMN-8905671-MJNHBG", "852963-QAZWS-3456781-EDCRFV", "963852-TGBZH-7890124-UJMYHN",
            "159357-YHNMK-2347890-IKJUMY", "357951-NHBVG-4561238-ZAQWSX", "486248-RFVTG-5678901-CDEWQS",
            "512843-EDCXZ-6789012-RFVBGT", "673194-WQERT-7890123-YUIOPK"
        ];

        const keyInput = document.getElementById('keyInput');
        const accessBtn = document.getElementById('accessBtn');
        const authMessageDiv = document.getElementById('authMessage');

        function showMessage(text, type) {
            authMessageDiv.style.display = 'block';
            authMessageDiv.className = `auth-message ${type}`;
            authMessageDiv.textContent = text;
        }

        if (localStorage.getItem('tutorial_access') === 'granted') {
            window.location.href = 'menu.html';
        }

        accessBtn.addEventListener('click', () => {
            const enteredKey = keyInput.value.trim();
            if (!enteredKey) {
                showMessage('Please enter a key.', 'error');
                return;
            }

            const match = VALID_KEYS.find(k => k.toLowerCase() === enteredKey.toLowerCase());
            if (match) {
                showMessage('Access granted. Redirecting...', 'success');
                localStorage.setItem('tutorial_access', 'granted');
                setTimeout(() => {
                    window.location.href = 'menu.html';
                }, 1000);
            } else {
                showMessage('Invalid key. Access denied.', 'error');
                keyInput.value = '';
            }
        });

        keyInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                accessBtn.click();
            }
        });
    </script>
</body>
</html>
